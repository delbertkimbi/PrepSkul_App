        padding-left: 20px;
        margin-bottom: 20px; /* reduced to save height */
      }
      .stat-val {
        font-family: 'Montserrat', sans-serif;
        font-size: 64px;
        color: #1A1A1A;

      }
      .stat-label {
        font-size: 20px;
        color: #4A4A4A;

      }
