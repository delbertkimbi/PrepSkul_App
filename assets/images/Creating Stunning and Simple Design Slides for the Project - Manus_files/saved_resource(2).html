        overflow: hidden;

        background: #0055FF;

      }
      .content-left {
        grid-column: span 5;
        padding-left: 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .content-right {
        grid-column: span 7;
        padding-right: 80px;
        padding-left: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .chart-wrapper {
        height: 400px;
        background: #F9F9F9;
        padding: 20px;
      }
      .insight-tag {
        font-family: 'Montserrat', sans-serif;
        font-size: 32px;
        font-weight: 800;
        color: #FF3366;
        text-transform: uppercase;
        border-left: 8px solid #FF3366;
        padding-left: 20px;
        margin-top: 40px;
      }
      p {
        font-size: 24px;
        color: #4A4A4A;
        line-height: 1.4;
      }

    <div class="slide-container">
        <div class="header-area">
            <h2>User Experience (QoE)</h2>
            <div class="hr-main"></div>
        </div>
        <div class="content-left">
            <p>Despite heavy reliance on mobile networks...</p>
            <div class="insight-tag">High usage but poor experience</div>
        </div>
        <div class="content-right">
            <h3 style="font-family: &#39;Montserrat&#39;, sans-serif; font-size: 22px; margin-bottom: 20px; color: #1A1A1A;">Overall Network Experience (%)</h3>
            <div class="chart-wrapper">
                <canvas id="qoeChart" width="1173" height="800" style="display: block; box-sizing: border-box; height: 400px; width: 586.5px;"></canvas>
            </div>
        </div>
    </div>
    <script nonce="">
        const ctx = document.getElementById('qoeChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Average', 'Poor', 'Very Poor', 'Good/Excellent'],
                datasets: [{
                    data: [51.6, 27.9, 19.7, 7.4],
                    backgroundColor: ['#0055FF', '#FF3366', '#1A1A1A', '#E0E0E0'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right', labels: { font: { family: 'Inter', size: 16 } } }
                }
            }
        });
    </script>
