name: prepskul
description: "PrepSkul - Connect with verified tutors for personalized learning. Book trial sessions, schedule lessons, and track your progress."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+14

environment:
  sdk: ^3.8.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  fl_chart: ^0.68.0
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # Localization
  flutter_localizations:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Google Sign-In
  google_sign_in: ^6.2.1
  
  # Firebase - upgraded for compatibility with GoogleUtilities 8.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.2.10
  
  # Local Notifications (for displaying notifications)
  flutter_local_notifications: ^16.3.0
  flutter_timezone: ^4.1.0
  
  # UI Components
  google_fonts: ^6.1.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  # Calendar and Scheduling
  table_calendar: ^3.0.9
  
  # Maps and Location
  geolocator: ^11.0.0
  geocoding: ^2.1.1  # For address to coordinates conversion
  flutter_map: ^6.1.0  # Leaflet for Flutter (open-source, privacy-friendly)
  latlong2: ^0.9.0  # Coordinates for flutter_map
  
  # Video Conferencing
  url_launcher: ^6.2.5
  youtube_player_flutter: ^9.0.3
  agora_rtc_engine: ^6.3.0  # Agora RTC SDK for live video sessions
  pointer_interceptor: ^0.10.1+2  # Keeps call chrome above web platform views

  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # File Handling
  image_picker: ^1.0.7
  file_picker: ^8.0.0  # Updated for Flutter 3.35.6 compatibility
  path: ^1.8.3
  mime: ^2.0.0
  image: ^4.3.0  # For image compression and optimization
  
  # Utilities
  connectivity_plus: ^5.0.2
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  
  # HTTP Client
  http: ^1.1.0
  percent_indicator: ^4.2.3
  
  # Audio/Sound Effects
  audioplayers: ^6.0.0
  record: ^5.2.1
  flutter_tts: ^4.0.2  
  # Sharing
  share_plus: ^10.0.0
  
  # Deep Linking
  app_links: ^6.3.3
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Google APIs (for Calendar)
  googleapis: ^11.0.0
  googleapis_auth: ^1.4.1
  
  # Confetti Celebration
  confetti: ^0.7.0
  
  # Platform Achievements & Leaderboards
  games_services: ^5.0.0
  video_player: ^2.10.1
  pdf: ^3.12.0
  pdfx: ^2.9.2
  country_flags: ^4.1.2
  genui: ^0.9.2
  json_schema_builder: ^0.1.5
  phosphoricons_flutter: ^1.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - lib/data/
    - assets/images/
    - assets/data/
    - assets/audio/
    - assets/audio/music/bgm_focus_loop.ogg
    - assets/audio/music/bgm_adventure_loop.ogg
    - assets/audio/music/bgm_results_soft_loop.ogg
    - assets/audio/music/sfx_card_flip.ogg
    - assets/audio/music/sfx_correct_chime.ogg
    - assets/audio/music/sfx_level_up.ogg
    - assets/audio/music/sfx_streak_ping.ogg
    - assets/audio/music/sfx_tap_soft.ogg
    - assets/audio/music/sfx_victory_short.ogg
    - assets/audio/music/sfx_wrong_mute.ogg
    - assets/sounds/
    - assets/characters/
    # Explicit paths so Android release builds reliably bundle mascot media (folder-only
    # entries have been observed to omit some subpaths on some toolchains).
    - assets/characters/mascots/default.png
    - assets/characters/mascots/thinking.png
    - assets/characters/mascots/encouraging.png
    - assets/characters/mascots/celebration.png
    # KYC flow mascots (explicit paths — subfolder assets under images/ can be omitted on some builds)
    - assets/images/kyc/kyc_intro.png
    - assets/images/kyc/kyc_submitted.png
    - assets/images/kyc/kyc_pending.png
    - assets/images/kyc/kyc_rejected.png
    - assets/characters/animations/Neutral.mp4
    - assets/characters/animations/Think.mp4
    - assets/characters/animations/Encouraging.mp4
    - assets/characters/animations/Celebrate.mp4
    - assets/fonts/
    - .env  # Root .env file (bundled for web, used for all platforms)

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins/Poppins-Black.ttf
          weight: 900

l10n:
  arb-dir: lib/l10n
  template-arb-file: app_en.arb
  output-localization-file: app_localizations.dart
  synthetic-package: true

# record 5.2.1 resolves record_web ^1.1.5 to 1.3.0, which needs record_platform_interface
# ^1.5 (streamBufferSize). record_linux 0.7.2 breaks against interface 1.6+.
# Pin web + interface to the last mutually compatible pair for web + linux builds.
dependency_overrides:
  record_platform_interface: 1.2.0
  record_web: 1.1.8
